<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechBlog - 科技博客</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 粒子动画背景 -->
  <canvas id="particles-canvas"></canvas>
  <div class="grid-overlay"></div>

  <!-- 提示消息容器 -->
  <div id="toast-container" class="toast-container"></div>

  <div class="app-container">

    <!-- 导航栏 -->
    <nav class="navbar">
      <div class="nav-brand">
        <div class="brand-icon">⚡</div>
        <span>TechBlog</span>
      </div>

      <div class="nav-links">
        <button class="nav-link active" data-view="home">首页</button>
        <button class="nav-link admin-link" id="nav-admin" data-view="admin" style="display:none">管理后台</button>
      </div>

      <div class="nav-user">
        <!-- 未登录时显示 -->
        <div id="nav-auth" style="display:flex;gap:8px;">
          <button class="nav-link" data-view="login">登录</button>
          <button class="nav-link" data-view="register">注册</button>
        </div>
        <!-- 登录后显示 -->
        <div id="nav-user" style="display:none;align-items:center;gap:12px;">
          <div class="user-avatar" id="user-avatar"></div>
          <span class="user-name" id="user-name"></span>
          <button class="btn-logout" id="btn-logout">退出</button>
        </div>
      </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">

      <!-- 首页 -->
      <div id="view-home" class="page-view active">
        <div class="hero">
          <h1>探索 <span class="gradient-text">科技前沿</span> 的无限可能</h1>
          <p>在这里发现最新的技术趋势、深度分析与独到见解</p>
        </div>
        <div class="glow-line"></div>
        <div class="articles-grid" id="articles-grid"></div>
        <div id="articles-empty" class="empty-state" style="display:none">
          <div class="empty-icon">📝</div>
          <p>暂无文章，敬请期待</p>
        </div>
      </div>

      <!-- 登录页 -->
      <div id="view-login" class="page-view">
        <div class="auth-container">
          <h2>欢迎回来</h2>
          <p class="auth-subtitle">登录你的账户，继续探索</p>
          <form id="login-form">
            <div class="form-group">
              <label>账号</label>
              <input type="text" id="login-account" placeholder="请输入账号" required autocomplete="username">
            </div>
            <div class="form-group">
              <label>密码</label>
              <input type="password" id="login-password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            <div class="form-error" id="login-error"></div>
            <button type="submit" class="btn btn-primary">登 录</button>
          </form>
          <div class="auth-switch">
            还没有账户？<a data-view="register">立即注册</a>
          </div>
        </div>
      </div>

      <!-- 注册页 -->
      <div id="view-register" class="page-view">
        <div class="auth-container">
          <h2>创建账户</h2>
          <p class="auth-subtitle">加入 TechBlog，开启你的科技之旅</p>
          <form id="register-form">
            <div class="form-group">
              <label>账号</label>
              <input type="text" id="reg-account" placeholder="8-10 位数字" required>
              <div class="form-hint">账号由 8 到 10 位纯数字组成</div>
            </div>
            <div class="form-group">
              <label>密码</label>
              <input type="password" id="reg-password" placeholder="至少 8 位，包含字母和数字" required>
              <div class="form-hint">密码不可少于 8 位，须同时包含字母和数字</div>
            </div>
            <div class="form-group">
              <label>确认密码</label>
              <input type="password" id="reg-confirm" placeholder="再次输入密码" required>
            </div>
            <div class="form-error" id="reg-error"></div>
            <button type="submit" class="btn btn-primary">注 册</button>
          </form>
          <div class="auth-switch">
            已有账户？<a data-view="login">去登录</a>
          </div>
        </div>
      </div>

      <!-- 文章详情页 -->
      <div id="view-article" class="page-view">
        <div class="article-detail">
          <button class="back-btn" onclick="App.navigate('home')">← 返回首页</button>
          <div class="detail-header">
            <h1 class="detail-title" id="detail-title"></h1>
            <div class="detail-meta" id="detail-meta"></div>
          </div>
          <div class="detail-content" id="detail-content"></div>
          <div class="detail-actions" id="detail-actions"></div>

          <!-- 评论区 -->
          <div class="comments-section">
            <h3>💬 评论区</h3>
            <form class="comment-form" id="comment-form">
              <input type="text" id="comment-input" placeholder="写下你的评论..." required>
              <button type="submit" class="btn btn-sm btn-primary" style="width:auto">发送</button>
            </form>
            <div class="comment-list" id="comment-list"></div>
          </div>
        </div>
      </div>

      <!-- 管理后台 -->
      <div id="view-admin" class="page-view">
        <div class="admin-panel">
          <div class="admin-header">
            <h2>⚙️ 管理后台</h2>
            <button class="btn btn-secondary" onclick="App.openNewArticle()">+ 发布文章</button>
          </div>

          <div class="admin-stats">
            <div class="stat-card">
              <div class="stat-value" id="stat-articles">0</div>
              <div class="stat-label">文章总数</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-users">0</div>
              <div class="stat-label">注册用户</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-likes">0</div>
              <div class="stat-label">总点赞数</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-comments">0</div>
              <div class="stat-label">总评论数</div>
            </div>
          </div>

          <div class="glow-line"></div>

          <table class="admin-table">
            <thead>
              <tr>
                <th>标题</th>
                <th>标签</th>
                <th>发布时间</th>
                <th>互动</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="admin-tbody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- 文章编辑弹窗 -->
  <div class="modal-overlay" id="editor-modal">
    <div class="modal">
      <h3 id="editor-heading">发布新文章</h3>
      <div class="form-group">
        <label>文章标题</label>
        <input type="text" id="editor-title" placeholder="输入文章标题">
      </div>
      <div class="form-group">
        <label>标签分类</label>
        <input type="text" id="editor-tag" placeholder="如：科技前沿、AI、区块链">
      </div>
      <div class="form-group">
        <label>文章内容</label>
        <textarea id="editor-content" placeholder="在这里撰写你的文章内容..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="App.closeEditor()">取消</button>
        <button class="btn btn-primary" style="width:auto" onclick="App.saveArticle()">发布</button>
      </div>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-dialog">
      <h4>⚠️ 确认删除</h4>
      <p>删除后无法恢复，确定要继续吗？</p>
      <div class="confirm-actions">
        <button class="btn btn-secondary" id="confirm-no">取消</button>
        <button class="btn btn-danger" id="confirm-yes">确认删除</button>
      </div>
    </div>
  </div>

  <!-- 引入脚本 -->
  <script src="js/particles.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
